name: publish

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: Release version type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: Pre-release (next)
        required: false
        type: boolean
        default: false
      skip-npm-publish:
        description: Skip NPM publish
        required: false
        type: boolean
        default: false
      dry-run:
        description: Dry run
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write # For git operations (commit, tag, push)
      id-token: write # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run lint
      - run: npm run prettier
      - run: npm run build
      - run: npm run tsc
      - run: npx publint
      - run: npx playwright install --with-deps chromium
      - run: npm run test

      - uses: vitalets/npm-release@v1
        with:
          release-version: ${{ inputs.release-version }}
          prerelease: ${{ inputs.prerelease }}
          skip-npm-publish: ${{ inputs.skip-npm-publish }}
          dry-run: ${{ inputs.dry-run }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
